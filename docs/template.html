<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>$pagetitle$</title>
<link rel="icon" href="https://raw.githubusercontent.com/gi-dellav/zerostack/main/assets/logo_rounded.png" type="image/png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,400;0,500;0,700;1,400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0d0d0d;--surface:#141414;--border:#1e1e1e;--text:#c0c0c0;--text-dim:#666;--accent:#5f9;--accent-dim:#3a7;--heading:#e0e0e0}
html{font-size:15px;scroll-behavior:smooth}
body{font-family:'JetBrains Mono','Cascadia Code','Fira Code','Consolas',monospace;background:var(--bg);color:var(--text);line-height:1.7;-webkit-font-smoothing:antialiased}
a{color:var(--accent);text-decoration:none;transition:color .15s}
a:hover{color:var(--accent-dim)}
::selection{background:var(--accent);color:var(--bg)}
.container{max-width:820px;margin:0 auto;padding:0 24px}
nav{padding:20px 0;border-bottom:1px solid var(--border);margin-bottom:40px}
nav a{font-size:.82rem}
article{padding-bottom:48px}
article h1{font-size:1.8rem;font-weight:700;color:var(--heading);margin-bottom:32px;letter-spacing:-.02em}
article h1::before{content:'# ';color:var(--accent)}
article h2{font-size:1.15rem;font-weight:700;color:var(--heading);margin:32px 0 12px}
article h2::before{content:'## ';color:var(--accent)}
article h3{font-size:.95rem;font-weight:500;color:var(--heading);margin:24px 0 8px}
article h3::before{content:'### ';color:var(--accent)}
article p{margin-bottom:16px}
article ul,article ol{margin-bottom:16px;padding-left:24px}
article li{margin-bottom:4px}
article code{background:var(--surface);border:1px solid var(--border);border-radius:4px;padding:2px 6px;font-size:.82rem;color:var(--accent)}
article pre{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:14px 16px;overflow-x:auto;margin-bottom:16px;line-height:1.6}
article pre code{background:none;border:none;padding:0;color:var(--text)}
article table{width:100%;border-collapse:collapse;margin-bottom:16px;font-size:.85rem}
article th,article td{text-align:left;padding:8px 12px;border-bottom:1px solid var(--border)}
article th{color:var(--accent);font-weight:500}
article blockquote{border-left:3px solid var(--accent);padding:8px 16px;margin-bottom:16px;background:var(--surface);border-radius:0 6px 6px 0;color:var(--text-dim)}
article hr{border:none;border-top:1px solid var(--border);margin:32px 0}
article img{max-width:100%;height:auto}
footer{padding:32px 0;text-align:center;font-size:.78rem;color:var(--text-dim);border-top:1px solid var(--border)}
@media(max-width:600px){.container{padding:0 16px}article h1{font-size:1.4rem}}
</style>
</head>
<body>
<div class="container">
<nav><a href="./">← zerostack</a></nav>
<article>
$if(title)$
<h1>$title$</h1>
$endif$
$body$
</article>
<footer>
<p>zerostack &mdash; <a href="https://github.com/gi-dellav/zerostack" target="_blank" rel="noopener">GitHub</a></p>
</footer>
</div>
</body>
</html>
